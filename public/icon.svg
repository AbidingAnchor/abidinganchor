<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep navy circle/rounded square #0a1a3e -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="#0a1a3e"/>

  <!-- Gold cross #D4A843 -->
  <!-- Vertical bar -->
  <rect x="232" y="120" width="48" height="260" fill="#D4A843"/>
  <!-- Horizontal bar -->
  <rect x="160" y="232" width="192" height="48" fill="#D4A843"/>

  <!-- Subtle highlight on left edge of cross bars #ffe89a, 40% opacity -->
  <!-- Vertical bar highlight -->
  <rect x="232" y="120" width="10" height="260" fill="#ffe89a" opacity="0.4"/>
  <!-- Horizontal bar highlight -->
  <rect x="160" y="232" width="192" height="10" fill="#ffe89a" opacity="0.4"/>

  <!-- Light rays emanating from top of cross (thin lines, #fff8d0, low opacity) -->
  <g opacity="0.2">
    <line x1="256" y1="120" x2="256" y2="40" stroke="#fff8d0" stroke-width="2"/>
    <line x1="256" y1="120" x2="200" y2="60" stroke="#fff8d0" stroke-width="2"/>
    <line x1="256" y1="120" x2="312" y2="60" stroke="#fff8d0" stroke-width="2"/>
    <line x1="256" y1="120" x2="220" y2="80" stroke="#fff8d0" stroke-width="2"/>
    <line x1="256" y1="120" x2="292" y2="80" stroke="#fff8d0" stroke-width="2"/>
  </g>
</svg>