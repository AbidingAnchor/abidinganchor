    />
    <title>AbidingAnchor</title>
    <script>
      (function () {
        function logThemeMutation(source, payload) {
          try {
            var ts = new Date().toISOString()
            console.log('[theme-debug] ' + ts + ' ' + source, payload)
          } catch (e) {
            /* no-op */
          }
        }
        try {
          var preference = 'automatic'
          var raw = localStorage.getItem('theme-preference')
          var v = String(raw || '').trim().toLowerCase()
          if (v === 'day' || v === 'evening' || v === 'night' || v === 'automatic') {
            preference = v
          }

          var now = new Date()
          var totalMinutes = now.getHours() * 60 + now.getMinutes()
          var theme = 'night'
          if (preference === 'day') theme = 'day'
          else if (preference === 'evening') theme = 'sunset'
          else if (preference === 'night') theme = 'night'
          else if (totalMinutes >= 6 * 60 && totalMinutes < 18 * 60) theme = 'day'
          else if (totalMinutes >= 18 * 60 && totalMinutes < 20 * 60) theme = 'sunset'

          var root = document.documentElement
          logThemeMutation('index.html bootstrap: set data-theme', {
            preference: preference,
            theme: theme,
            hour: now.getHours(),
            minute: now.getMinutes(),
          })
          root.setAttribute('data-theme', theme)

          var body = document.body
          if (!body) return
          var before = body.className
          var classes = [
            'theme-day',
            'theme-morning',
            'theme-afternoon',
            'theme-evening',
            'theme-sunset',
            'theme-night',
          ]
          for (var i = 0; i < classes.length; i++) body.classList.remove(classes[i])

          if (theme === 'day') {
            body.classList.add('theme-day')
            body.classList.add(now.getHours() < 12 ? 'theme-morning' : 'theme-afternoon')
          } else if (theme === 'sunset') {
            body.classList.add('theme-sunset')
            body.classList.add('theme-evening')
          } else {
            body.classList.add('theme-night')
          }
          logThemeMutation('index.html bootstrap: body theme classes', {
            theme: theme,
            before: before,
            after: body.className,
          })
        } catch (e) {
          /* no-op */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
